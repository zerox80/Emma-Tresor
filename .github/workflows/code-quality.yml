name: Code quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-limits:
    name: Repository limits
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Enforce file and line limits
        run: python scripts/check_code_quality.py
