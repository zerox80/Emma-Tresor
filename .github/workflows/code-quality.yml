name: Code quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-limits:
    name: Repository limits
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Enforce file and line limits
        run: python scripts/check_code_quality.py

      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

      - name: Check pushed commit whitespace
        if: github.event_name == 'push'
        run: git diff --check "${{ github.event.before }}..${{ github.sha }}"

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: ci-only-secret-key-longer-than-thirty-two-bytes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Check Django configuration
        run: python manage.py check

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Run backend tests
        run: python manage.py test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript types
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
